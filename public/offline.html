<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0E0828" />
    <title>af.games hors-ligne</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(circle at 50% 12%, rgba(255, 62, 165, 0.22), transparent 44%),
          linear-gradient(180deg, #0a0420 0%, #0e0828 100%);
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        box-sizing: border-box;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }

      .panel {
        max-width: 360px;
      }

      .icon {
        width: 72px;
        height: 72px;
        border-radius: 22px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        font-size: 34px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1;
        letter-spacing: -0.03em;
      }

      p {
        margin: 14px 0 0;
        color: rgba(255, 255, 255, 0.68);
        line-height: 1.5;
      }

      button {
        margin-top: 24px;
        border: 0;
        border-radius: 999px;
        padding: 14px 20px;
        background: linear-gradient(135deg, #ff3ea5, #7a4ee8);
        color: #fff;
        font-weight: 800;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="panel">
        <div class="icon">🍻</div>
        <h1>Mode hors-ligne</h1>
        <p>
          af.games est installé, mais cette page n'est pas encore disponible sans réseau.
          Rouvre une page déjà chargée ou reconnecte-toi pour lancer une salle en ligne.
        </p>
        <button type="button" onclick="location.reload()">Réessayer</button>
      </div>
    </main>
  </body>
</html>
